<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <title>Wikipedia Search</title>
</head>

<body class="bg-dark-subtle">
<div class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1 container mt-5">
        <h1>CT5169 Search Wikipedia</h1>
        <form method="POST" onsubmit="showLoading()">
            <div class="row">
                <div class="col-12 col-md-6">
                    <div class="input-group mb-3">
                        <input type="text" name="query" class="form-control" placeholder="Search...">
                        <button type="submit" class="btn btn-primary">
                            Search
                        </button>
                    </div>
                </div>
            </div>
        </form>
        <div id="loader" class="mt-3" style="display:none;">
            <div class="spinner-border text-success" role="status"></div>
            <span class="ms-2">Fetching results...</span>
        </div>
        {% if result %}
        <h4 class="mt-4">Results for: "<strong>{{ query }}</strong>"</h4>

        <div class="mt-3 alert alert-info">
            {{ result }}
        </div>
        {% endif %}
    </main>

    <footer class="mt-auto bg-light py-3 bg-custom">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo">Search Wikipedia</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>


<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();

    function showLoading() {
        document.getElementById("loader").style.display = "block";
        document.querySelector("button[type='submit']").disabled = true;
    }
</script>
</body>

</html>
